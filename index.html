<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth Scroll Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
        }

        /* Style for the fixed navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            cursor: pointer;
        }

        /* Highlight style for the active link */
        .active {
            color: #ffcc00;
        }
    </style>
</head>

<body>
    <!-- Fixed navigation menu -->
    <nav>
        <a href="#section1" class="scroll-link">Section 1</a>
        <a href="#section2" class="scroll-link">Section 2</a>
        <a href="#section3" class="scroll-link">Section 3</a>
    </nav>

    <!-- Sections with content -->
    <section id="section1" style="background-color: #f2f2f2;">Section 1</section>
    <section id="section2" style="background-color: #b3d9ff;">Section 2</section>
    <section id="section3" style="background-color: #ffe6cc;">Section 3</section>

    <!-- JavaScript for smooth scrolling -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var sections = document.querySelectorAll('section');
            var scrollLinks = document.querySelectorAll('.scroll-link');

            window.addEventListener('scroll', function () {
                // Find the current scroll position
                var scrollPosition = window.scrollY || window.pageYOffset;

                // Find the index of the section that is currently in view
                var currentIndex = 0;
                sections.forEach(function (section, index) {
                    var sectionTop = section.offsetTop;
                    if (scrollPosition >= sectionTop) {
                        currentIndex = index;
                    }
                });

                // Highlight the corresponding link in the navigation menu
                scrollLinks.forEach(function (link) {
                    link.classList.remove('active');
                });
                scrollLinks[currentIndex].classList.add('active');

                // Simulate a click event on the next link when scrolling down
                if (currentIndex < scrollLinks.length - 1 && scrollPosition >= sections[currentIndex + 1].offsetTop) {
                    scrollLinks[currentIndex + 1].click();
                }
            });

            // Loop through each link and add a click event listener
            scrollLinks.forEach(function (link, index) {
                link.addEventListener('click', function (e) {
                    e.preventDefault();

                    // Get the target element's ID from the link's href attribute
                    var targetId = this.getAttribute('href').substring(1);

                    // Use the target ID to find the actual element
                    var targetElement = document.getElementById(targetId);

                    // Scroll to the target element smoothly
                    if (targetElement) {
                        targetElement.scrollIntoView({
                            behavior: 'smooth'
                        });
                    }
                });
            });
        });
    </script>
</body>

</html>

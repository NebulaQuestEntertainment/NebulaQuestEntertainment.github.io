<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME FREAK</title>

    <!-- Include your stylesheets and scripts here -->
    <link rel="stylesheet" href="path/to/your/styles.css">
    <script defer src="https://www.googletagmanager.com/gtag/js?id=G-SE9TT8Q4TZ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-SE9TT8Q4TZ');
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Get all anchor links with the class 'scroll-link'
            var scrollLinks = document.querySelectorAll('a.scroll-link');

            // Loop through each link and add a click event listener
            scrollLinks.forEach(function (link) {
                link.addEventListener('click', function (e) {
                    e.preventDefault();

                    // Get the target element's ID from the link's href attribute
                    var targetId = this.getAttribute('href').substring(1);

                    // Use the target ID to find the actual element
                    var targetElement = document.getElementById(targetId);

                    // Scroll to the target element smoothly
                    if (targetElement) {
                        targetElement.scrollIntoView({
                            behavior: 'smooth'
                        });
                    }
                });
            });
        });
    </script>
</head>

<body>
    <header>
        <h1 class="logo"><a href="/"><img src="/assets/img/logo.svg" alt="GAME FREAK"></a></h1>
        <!-- Add your navigation elements here -->
        <nav>
            <ul>
                <!-- Add the 'scroll-link' class to enable smooth scrolling -->
                <li><a href="#vision" class="scroll-link">Vision</a></li>
                <li><a href="#works" class="scroll-link">Works</a></li>
                <li><a href="#message" class="scroll-link">Message</a></li>
                <li><a href="#company" class="scroll-link">Company</a></li>
                <li><a href="#topics" class="scroll-link">Topics</a></li>
                <li><a href="#recruit" class="scroll-link">Recruit</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Add your main content sections here -->
        <section id="vision" class="slide">
            <!-- Add your slide content here -->
        </section>

        <section id="works" class="slide__block slide__block--works">
            <!-- Add your works content here -->
        </section>

        <section id="message" class="slide__block slide__block--dna">
            <!-- Add your message content here -->
        </section>

        <section id="company" class="slide__block slide__block--company">
            <!-- Add your company content here -->
        </section>

        <section id="topics" class="slide__block slide__block--topics">
            <!-- Add your topics content here -->
        </section>

        <section id="recruit" class="slide__block slide__block--recruit">
            <!-- Add your recruit content here -->
        </section>
    </main>

    <footer>
        <!-- Add your footer content here -->
    </footer>
</body>

</html>
